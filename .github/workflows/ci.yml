name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven (strict)
      run: mvn -B verify --file pom.xml -Dmaven.test.failure.ignore=false -Denforcer.skip=false
    - name: Run benchmarks (smoke test)
      run: mvn -B test-compile exec:java -Dexec.mainClass="com.fintech.lob.bench.OrderBookBenchmark" -Dexec.classpathScope=test
